<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - My Travel Scrapbook</title>
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">Wanderlust</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main style="padding-top: 8rem;">
        <h1 style="text-align: center; font-size: 4rem;">The Highlights</h1>
        
        <div class="scrapbook-container">
            <!-- INTENTIONAL SABOTAGE: Missing alt attribute for easy task -->
            <div class="scrapbook-item item-1">
                <div class="tape"></div>
                <img src="assets/paris_trip.png" class="scrapbook-photo">
                <p class="handwriting photo-caption">A sunny day at the Eiffel Tower</p>
            </div>

            <!-- INTENTIONAL SABOTAGE: Empty alt attribute for easy task -->
            <div class="scrapbook-item item-2">
                <div class="tape"></div>
                <img src="assets/kyoto_temple.png" class="scrapbook-photo" alt="">
                <p class="handwriting photo-caption">Autumn leaves in Kyoto</p>
            </div>

            <!-- INTENTIONAL SABOTAGE: Missing alt attribute for easy task -->
            <div class="scrapbook-item item-3">
                <div class="tape"></div>
                <img src="assets/swiss_alps.png" class="scrapbook-photo">
                <p class="handwriting photo-caption">Snowy peaks in the Swiss Alps</p>
            </div>
        </div>
    </main>
</body>
</html>
